services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: civiclens-rag-postgres
    environment:
      POSTGRES_DB: civiclens_rag
      POSTGRES_USER: civiclens
      POSTGRES_PASSWORD: civiclens_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

volumes:
  postgres_data:
